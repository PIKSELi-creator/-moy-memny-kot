<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мой мемный кот</title>
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- Шапка профиля и показатели кота -->
    <div class="stats-container">
        <div id="username" class="user-name">Загрузка бойца...</div>
        <div class="stat-row">
            <span>🍗 Сытость:</span> 
            <span id="hunger">100%</span>
        </div>
        <div class="stat-row">
            <span>⚡ Энергия:</span> 
            <span id="energy">100%</span>
        </div>
    </div>

    <!-- Баланс внутриигровой валюты -->
    <div class="balance-container">
        🐟 <span id="balance-count">0</span> МемКоинов
    </div>

    <!-- Главный экран с котом -->
    <div class="game-field">
        <div id="cat-status" class="cat-status">Кот ждет твоего тапа</div>
        <div id="main-cat" class="cat-avatar">🐱</div>
    </div>

    <!-- Панель управления (Кнопки) -->
    <div class="buttons-grid">
        <button class="btn btn-feed" onclick="feedCat()">Покормить</button>
        <button class="btn btn-shop" onclick="openShop()">Магазин</button>
    </div>

    <!-- Подключаем JS-скрипты в правильном порядке -->
    <script src="js/tg-init.js"></script>
    <script src="js/game.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
